<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <style>
      .sans { font-family: 'DejaVu Sans','Helvetica Neue',Arial,sans-serif; }
      .mono { font-family: 'DejaVu Sans Mono','Courier New',monospace; }
    </style>
  </defs>

  <!-- warm paper backdrop -->
  <rect width="1200" height="630" fill="#F6F2EA"/>
  <rect width="1200" height="630" fill="none"/>

  <!-- thin frame -->
  <rect x="24" y="24" width="1152" height="582" rx="20" fill="none" stroke="#E2DACA" stroke-width="2"/>

  <!-- eyebrow -->
  <text x="80" y="132" class="mono" font-size="22" letter-spacing="3" fill="#8C8472">BY THE DESIGN GYM</text>

  <!-- wordmark -->
  <g transform="translate(80,196)">
    <text x="0" y="0" class="sans" font-size="40" font-weight="300" fill="#181410">adaptive</text>
    <circle cx="208" cy="-12" r="11" fill="#E9B30B"/>
    <text x="232" y="0" class="sans" font-size="40" font-weight="800" fill="#181410">OS</text>
  </g>

  <!-- headline -->
  <text x="80" y="318" class="sans" font-size="68" font-weight="700" fill="#181410">A self-improving</text>
  <text x="80" y="398" class="sans" font-size="68" font-weight="700" fill="#181410">operating system</text>
  <text x="80" y="478" class="sans" font-size="68" font-weight="300" fill="#5C5546">for teams.</text>

  <!-- five-layer stack accent, right side -->
  <g transform="translate(820,150)">
    <rect x="0"  y="0"   width="300" height="42" rx="10" fill="#4A453D"/>
    <rect x="0"  y="58"  width="300" height="42" rx="10" fill="#FFCD00"/>
    <rect x="0"  y="116" width="300" height="42" rx="10" fill="#17A38B"/>
    <rect x="0"  y="174" width="300" height="42" rx="10" fill="#CE3B82"/>
    <rect x="0"  y="232" width="300" height="42" rx="10" fill="#181410"/>
    <circle cx="150" cy="137" r="26" fill="#F6F2EA"/>
    <circle cx="150" cy="137" r="15" fill="#FFCD00"/>
  </g>
</svg>
